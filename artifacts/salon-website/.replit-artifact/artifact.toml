kind = "web"
previewPath = "/"
title = "Nguyen Beauty Salon"
version = "1.0.0"
id = "artifacts/salon-website"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26056

[services.development]
run = "pnpm --filter @workspace/salon-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/salon-website", "run", "build" ]
serve = "static"
publicDir = "artifacts/salon-website/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26056"
BASE_PATH = "/"
