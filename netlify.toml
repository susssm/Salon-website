[build]
  command   = "pnpm --filter @workspace/salon-website build"
  publish   = "artifacts/salon-website/dist/public"

[build.environment]
  BASE_PATH    = "/"
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

# SPA fallback — all routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
